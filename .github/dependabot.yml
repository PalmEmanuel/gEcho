version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      dev-tooling:
        patterns:
          - "@types/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
          - "mocha"
          - "@vscode/test-electron"
          - "@vscode/vsce"
        update-types:
          - minor
          - patch
    ignore:
      # vscode engine pinned intentionally — only bump with explicit engine update
      - dependency-name: "@types/vscode"
        update-types: [version-update:semver-major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
