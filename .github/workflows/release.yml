name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: '*.vsix'
          retention-days: 90
