name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.squad/**'
      - '*.md'
      - 'images/**'
      - 'docs/**'
      - '.github/workflows/squad-*.yml'
      - '.github/workflows/sync-squad-labels.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.squad/**'
      - '*.md'
      - 'images/**'
      - 'docs/**'
      - '.github/workflows/squad-*.yml'
      - '.github/workflows/sync-squad-labels.yml'

jobs:
  build-native:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build native helper
        run: bash scripts/build-native.sh

      - name: Verify native helper
        run: |
          OUTPUT=$(resources/bin/darwin/gecho-helper || echo "error")
          echo "Helper output: $OUTPUT"
          echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'bounds' in d and 'displayIndex' in d, 'Missing fields'"
          echo "✅ Native helper verified"

      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: native-binary
          path: resources/bin/darwin/
          retention-days: 1

  build-and-test:
    needs: build-native
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download native binary (macOS only)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@v8
        with:
          name: native-binary
          path: resources/bin/darwin/

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: npm run check-types

      - run: npm run lint

      - if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg

      - if: runner.os != 'Linux'
        uses: AnimMouse/setup-ffmpeg@v1

      - if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - if: runner.os != 'Linux'
        run: npm test

      - name: Integration tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration

      - name: Node integration tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npx mocha --config .mocharc.json --grep integration

      - name: Node integration tests
        if: runner.os != 'Linux'
        run: npx mocha --config .mocharc.json --grep integration

      - if: runner.os == 'Linux'
        run: npm run package

      - if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: vsix-artifact
          path: '*.vsix'
          retention-days: 30

