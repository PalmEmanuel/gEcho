name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.squad/**'
      - '*.md'
      - 'images/**'
      - 'docs/**'
      - '.github/workflows/squad-*.yml'
      - '.github/workflows/sync-squad-labels.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.squad/**'
      - '*.md'
      - 'images/**'
      - 'docs/**'
      - '.github/workflows/squad-*.yml'
      - '.github/workflows/sync-squad-labels.yml'

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: npm run check-types

      - run: npm run lint

      - if: runner.os == 'Linux'
        run: sudo apt-get install -y ffmpeg

      - if: runner.os != 'Linux'
        uses: AnimMouse/setup-ffmpeg@v1

      - if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - if: runner.os != 'Linux'
        run: npm test

      - name: Integration tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration

      - name: Node integration tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npx mocha --config .mocharc.json --grep integration

      - name: Node integration tests
        if: runner.os != 'Linux'
        run: npx mocha --config .mocharc.json --grep integration

      - if: runner.os == 'Linux'
        run: npm run package

      - if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: vsix-artifact
          path: '*.vsix'
          retention-days: 30
